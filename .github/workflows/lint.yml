name: Code Quality Check

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  lint:
    name: "Linter & Email Notification"
    runs-on: ubuntu-latest
    env:
      MAIL_FROM: "GitHub Robot <${{ secrets.MAIL_USERNAME }}>"

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar Linter y Capturar Errores
        id: run_lint
        # Ejecutamos el linter. El "|| echo" evita que el job se detenga aquí,
        # permitiendo que los pasos de envío de correo capturen el reporte.
        run: |
          npm run lint --silent --color=false > eslint_report.txt 2>&1 || echo "LINT_FAILED=true" >> $GITHUB_ENV

      - name: Extraer metadatos y reporte
        if: always()
        run: |
          # 1. SHA real del commit
          REAL_SHA="${{ github.event.pull_request.head.sha || github.sha }}"
          echo "SHORT_SHA=${REAL_SHA::7}" >> $GITHUB_ENV
          
          # 2. Firma DCO condicional
          SIGNOFF_RAW=$(git log -1 $REAL_SHA --format='%B' | grep -i '^Signed-off-by:' || echo '')
          if [ -n "$SIGNOFF_RAW" ]; then
            echo "COMMIT_SIGNOFF=<div style='margin-top:10px; padding-top:10px; border-top:1px dashed #d1d5da;'><strong>DCO:</strong> <span style='font-family:monospace;'>$SIGNOFF_RAW</span></div>" >> $GITHUB_ENV
          fi

          # 3. Procesar reporte de errores si falló
          if [ "${{ env.LINT_FAILED }}" == "true" ]; then
            ERRORS=$(cat eslint_report.txt | head -n 30)
            echo "LINT_ERRORS_HTML<<EOF" >> $GITHUB_ENV
            echo "<div style='background:#1e1e1e; color:#ff6b6b; padding:15px; border-radius:5px; font-family:monospace; font-size:12px; white-space:pre-wrap; overflow-x:auto;'>$ERRORS</div>" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          fi

      # --- NOTIFICACIÓN: ÉXITO ---
      - name: Enviar correo de éxito
        if: always() && env.LINT_FAILED != 'true' && github.event_name == 'pull_request'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ vars.MAIL_SERVER }}
          server_port: ${{ vars.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "PR Validada ✅: [${{ env.SHORT_SHA }}] ${{ github.event.pull_request.title }}"
          to: ${{ secrets.MAIL_TO }}
          from: ${{ env.MAIL_FROM }}
          html_body: |
            <div style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; max-width: 600px; border: 1px solid #e1e4e8; border-radius: 8px; overflow: hidden; margin: auto;">
              <div style="background-color: #2ea44f; color: white; padding: 24px; text-align: center;">
                <h1 style="margin: 0; font-size: 20px;">¡Validación Exitosa! 🎉</h1>
              </div>
              <div style="padding: 24px; color: #24292e; line-height: 1.6;">
                <p style="margin-top: 0;">La PR <strong>#${{ github.event.pull_request.number }}</strong> ha superado el linter sin observaciones.</p>
                <div style="background: #f6f8fa; padding: 16px; border-radius: 6px; border: 1px solid #d1d5da;">
                  <code>Commit: ${{ env.SHORT_SHA }}</code><br>
                  <code>Autor: ${{ github.event.pull_request.user.login }}</code>
                </div>
                <p style="margin-top: 24px; text-align: center;">
                  <a href="${{ github.event.pull_request.html_url }}" style="display: inline-block; background: #0366d6; color: white; padding: 12px 24px; text-decoration: none; border-radius: 6px; font-weight: 600;">Revisar y Merge</a>
                </p>
              </div>
              <div style="background: #f1f8ff; padding: 16px 24px; font-size: 11px; color: #586069; border-top: 1px solid #e1e4e8;">
                ${{ env.COMMIT_SIGNOFF }}
              </div>
            </div>

      # --- NOTIFICACIÓN: ERROR ---
      - name: Enviar correo de error
        if: always() && env.LINT_FAILED == 'true' && github.event_name == 'pull_request'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ vars.MAIL_SERVER }}
          server_port: ${{ vars.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Fallo de Linter ❌: [${{ env.SHORT_SHA }}] ${{ github.event.pull_request.title }}"
          to: ${{ secrets.MAIL_TO }}
          from: ${{ env.MAIL_FROM }}
          html_body: |
            <div style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; max-width: 600px; border: 1px solid #e1e4e8; border-radius: 8px; overflow: hidden; margin: auto;">
              <div style="background-color: #cf222e; color: white; padding: 24px; text-align: center;">
                <h1 style="margin: 0; font-size: 20px;">Reporte de Errores ⚠️</h1>
              </div>
              <div style="padding: 24px; color: #24292e; line-height: 1.6;">
                <p style="margin-top: 0;">Se han encontrado los siguientes errores en la PR <strong>#${{ github.event.pull_request.number }}</strong>:</p>
                
                ${{ env.LINT_ERRORS_HTML }}
                
                <p style="margin-top: 24px; text-align: center;">
                  <a href="${{ github.event.pull_request.html_url }}/checks" style="display: inline-block; background: #cf222e; color: white; padding: 12px 24px; text-decoration: none; border-radius: 6px; font-weight: 600;">Ver Logs Completos</a>
                </p>
              </div>
              <div style="background: #fff8f8; padding: 16px 24px; font-size: 11px; color: #586069; border-top: 1px solid #e1e4e8;">
                <strong>Commit:</strong> ${{ env.SHORT_SHA }}
                ${{ env.COMMIT_SIGNOFF }}
              </div>
            </div>

      - name: Registrar éxito del Linter
        if: success() && env.LINT_FAILED != 'true'
        run: echo "SUCCESS" > linter_status.txt

      - name: Subir artefacto de estado
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linter-status-${{ github.event.pull_request.head.sha || github.sha }}
          path: linter_status.txt
          retention-days: 1 # Solo lo mantenemos por 1 día para evitar acumulación

      # --- PASO FINAL: BLOQUEO DE SEGURIDAD ---
      - name: Verificar Integridad Final
        if: always()
        run: |
          if [ "${{ env.LINT_FAILED }}" == "true" ]; then
            echo "ERROR: El linter falló. Bloqueando el Merge."
            exit 1
          else
            echo "SUCCESS: Código limpio."
            exit 0
          fi