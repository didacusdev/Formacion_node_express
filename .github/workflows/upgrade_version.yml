name: Upgrade Version

on:
  pull_request:
    types:
      - closed

jobs:
  bump-version:
    # Solo corre si fue mergeado Y no fue una acción de "skip ci" (evita bucles)
    if: github.event.pull_request.merged == true && !contains(github.event.pull_request.title, '[skip ci]')
    runs-on: ubuntu-latest
    
    # Permisos para escribir en el repo y leer los checks
    permissions:
      contents: write
      checks: read
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Usar un token con permisos de escritura (el GITHUB_TOKEN suele bastar)
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verificar que el Linter haya pasado
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Usamos la CLI de GitHub para ver el estado del check específico
          # Si no es 'SUCCESS', el script falla aquí y no se sube la versión.
          STATUS=$(gh pr view ${{ github.event.pull_request.number }} --json statusCheckRollup --jq '.statusCheckRollup[] | select(.context=="Linter & Email Notification") | .state')
          
          if [ "$STATUS" != "SUCCESS" ]; then
            echo "❌ El linter no pasó satisfactoriamente (Estado: $STATUS). Abortando incremento de versión."
            exit 1
          fi
          echo "✅ Linter verificado correctamente."

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get PR info and files changed
        id: pr_info
        run: |
          # Obtenemos los archivos que cambiaron entre la base y el merge
          FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.merge_commit_sha }})
          echo "CHANGED_FILES<<EOF" >> $GITHUB_ENV
          echo "$FILES" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Determine version bump
        id: version_bump
        run: |
          bump=patch
          # Lógica por carpetas
          if echo "$CHANGED_FILES" | grep -E 'src/routes/'; then
            bump=major
          elif echo "$CHANGED_FILES" | grep -E 'src/controllers/|src/middlewares/|src/utils/|src/database/|src/app.js|src/server.js'; then
            bump=minor
          fi
          echo "bump=$bump" >> $GITHUB_OUTPUT

      - name: Bump version in package.json
        run: |
          # Guardamos la versión actual antes del cambio
          echo "PREV_VERSION=$(jq -r .version package.json)" >> $GITHUB_ENV
          npm version ${{ steps.version_bump.outputs.bump }} --no-git-tag-version
          echo "NEW_VERSION=$(jq -r .version package.json)" >> $GITHUB_ENV

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "ci: bump version to v${{ env.NEW_VERSION }} [skip ci]" || echo "No changes to commit"
          # Empujamos directamente a la rama base (main o dev)
          git push origin HEAD:${{ github.event.pull_request.base.ref }}

      - name: Enviar correo de nueva versión
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ vars.MAIL_SERVER }}
          server_port: ${{ vars.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Nueva versión publicada 🚀: v${{ env.NEW_VERSION }}"
          to: ${{ secrets.MAIL_TO }}
          from: "GitHub Robot <${{ secrets.MAIL_USERNAME }}>"
          html_body: |
            <div style="font-family: sans-serif; max-width: 600px; border: 1px solid #e1e4e8; border-radius: 8px; overflow: hidden; margin: auto;">
              <div style="background-color: #2ea44f; color: white; padding: 24px; text-align: center;">
                <h1 style="margin: 0; font-size: 20px;">¡Nueva versión generada! 🚀</h1>
              </div>
              <div style="padding: 24px; color: #24292e; line-height: 1.6;">
                <p>Se ha detectado un cambio <strong>${{ steps.version_bump.outputs.bump }}</strong> y se ha actualizado la API.</p>
                <div style="background: #f6f8fa; padding: 16px; border-radius: 6px; border: 1px solid #d1d5da;">
                  <strong>v${{ env.PREV_VERSION }}</strong> → <strong style="color: #2ea44f;">v${{ env.NEW_VERSION }}</strong><br>
                  <strong>PR:</strong> #${{ github.event.pull_request.number }} - ${{ github.event.pull_request.title }}<br>
                  <strong>Autor:</strong> ${{ github.event.pull_request.user.login }}
                </div>
                <p style="text-align: center; margin-top: 24px;">
                  <a href="${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}" style="display: inline-block; background: #0366d6; color: white; padding: 12px 24px; text-decoration: none; border-radius: 6px; font-weight: bold;">Ver cambios en versión</a>
                </p>
              </div>
            </div>